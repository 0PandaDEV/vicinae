name: Build AppImage (arm64)

on:
  push:
    branches: [main, arm64]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vicinae-appimage-build-env

jobs:
  build-env:
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: write
    timeout-minutes: 360
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: hash
        run: |
          SHA=$(sha256sum scripts/runners/appimage/AppImageBuilder.Dockerfile | cut -c1-12)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER_LC}/vicinae-appimage-build-env:arm64-${{ steps.hash.outputs.sha }}"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"
          echo "image_latest=ghcr.io/${OWNER_LC}/vicinae-appimage-build-env:arm64-latest" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if env image already exists
        id: check
        run: |
          if docker manifest inspect "${{ steps.meta.outputs.image }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@v3
        if: steps.check.outputs.exists == 'false'

      - name: Build & push env image
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: scripts/runners/appimage
          file: scripts/runners/appimage/AppImageBuilder.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image_latest }}
          cache-to: type=inline

  build-appimage:
    needs: build-env
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: read
      packages: read
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build AppImage in env container
        run: |
          docker pull "${{ needs.build-env.outputs.image }}"
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            -e APPIMAGE_EXTRACT_AND_RUN=1 \
            "${{ needs.build-env.outputs.image }}" \
            -c "make appimage"

      - name: Locate artifact
        id: artifact
        run: |
          FILE=$(ls *.AppImage 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No AppImage produced" >&2
            ls -la
            exit 1
          fi
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: vicinae-aarch64-AppImage
          path: ${{ steps.artifact.outputs.file }}
          if-no-files-found: error
